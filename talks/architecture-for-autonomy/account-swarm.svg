<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <!-- one service = 2x2 cluster of accounts (tools/dev/staging/prod) -->
    <g id="svc">
      <rect x="0" y="0" width="20" height="20" rx="3"/>
      <rect x="24" y="0" width="20" height="20" rx="3"/>
      <rect x="0" y="24" width="20" height="20" rx="3"/>
      <rect x="24" y="24" width="20" height="20" rx="3"/>
    </g>
  </defs>

  <text x="312" y="64" text-anchor="middle" font-size="24" font-weight="700" fill="#2b2b33" letter-spacing="1">60 SERVICES</text>
  <text x="816" y="64" text-anchor="middle" font-size="24" font-weight="700" fill="#2b2b33" letter-spacing="1">× 4 ACCOUNTS EACH</text>

  <!-- the swarm: 10 x 6 services -->
  <g fill="#fdf0dd" stroke="#de7f11" stroke-width="2">
    <use href="#svc" x="20" y="90"/><use href="#svc" x="80" y="90"/><use href="#svc" x="140" y="90"/><use href="#svc" x="200" y="90"/><use href="#svc" x="260" y="90"/><use href="#svc" x="320" y="90"/><use href="#svc" x="380" y="90"/><use href="#svc" x="440" y="90"/><use href="#svc" x="500" y="90"/><use href="#svc" x="560" y="90"/>
    <use href="#svc" x="20" y="150"/><use href="#svc" x="80" y="150"/><use href="#svc" x="140" y="150"/><use href="#svc" x="200" y="150"/><use href="#svc" x="260" y="150"/><use href="#svc" x="320" y="150"/><use href="#svc" x="380" y="150"/><use href="#svc" x="440" y="150"/><use href="#svc" x="500" y="150"/><use href="#svc" x="560" y="150"/>
    <use href="#svc" x="20" y="210"/><use href="#svc" x="80" y="210"/><use href="#svc" x="140" y="210"/><use href="#svc" x="200" y="210"/><use href="#svc" x="260" y="210"/><use href="#svc" x="320" y="210"/><use href="#svc" x="380" y="210"/><use href="#svc" x="440" y="210"/><use href="#svc" x="500" y="210"/><use href="#svc" x="560" y="210"/>
    <use href="#svc" x="20" y="270"/><use href="#svc" x="80" y="270"/><use href="#svc" x="140" y="270"/><use href="#svc" x="200" y="270"/><use href="#svc" x="260" y="270"/><use href="#svc" x="320" y="270"/><use href="#svc" x="380" y="270"/><use href="#svc" x="440" y="270"/><use href="#svc" x="500" y="270"/><use href="#svc" x="560" y="270"/>
    <use href="#svc" x="20" y="330"/><use href="#svc" x="80" y="330"/><use href="#svc" x="140" y="330"/><use href="#svc" x="200" y="330"/><use href="#svc" x="260" y="330"/><use href="#svc" x="320" y="330"/><use href="#svc" x="380" y="330"/><use href="#svc" x="440" y="330"/><use href="#svc" x="500" y="330"/><use href="#svc" x="560" y="330"/>
    <use href="#svc" x="20" y="390"/><use href="#svc" x="80" y="390"/><use href="#svc" x="140" y="390"/><use href="#svc" x="200" y="390"/><use href="#svc" x="260" y="390"/><use href="#svc" x="320" y="390"/><use href="#svc" x="380" y="390"/><use href="#svc" x="440" y="390"/><use href="#svc" x="500" y="390"/><use href="#svc" x="560" y="390"/>
  </g>

  <!-- magnifier: one service pulled out into the zoom panel -->
  <rect x="554" y="144" width="56" height="56" rx="6" fill="none" stroke="#5b6472" stroke-width="2.5"/>
  <line x1="610" y1="146" x2="658" y2="92" stroke="#5b6472" stroke-width="2" opacity="0.65"/>
  <line x1="610" y1="198" x2="658" y2="400" stroke="#5b6472" stroke-width="2" opacity="0.65"/>

  <!-- the zoom: one service's 4 accounts -->
  <g fill="#fdf0dd" stroke="#de7f11" stroke-width="4">
    <rect x="660" y="90" width="150" height="150" rx="10"/>
    <rect x="822" y="90" width="150" height="150" rx="10"/>
    <rect x="660" y="252" width="150" height="150" rx="10"/>
    <rect x="822" y="252" width="150" height="150" rx="10"/>
  </g>
  <g font-size="13" font-weight="600" fill="#c07310" text-anchor="middle" letter-spacing="0.5">
    <text x="735" y="128">AWS ACCOUNT</text>
    <text x="897" y="128">AWS ACCOUNT</text>
    <text x="735" y="290">AWS ACCOUNT</text>
    <text x="897" y="290">AWS ACCOUNT</text>
  </g>
  <g font-size="24" font-weight="700" fill="#a35c00" text-anchor="middle">
    <text x="735" y="172">TOOLS</text>
    <text x="897" y="172">DEV</text>
    <text x="735" y="334">STAGING</text>
    <text x="897" y="334">PROD</text>
  </g>
  <text x="897" y="360" text-anchor="middle" font-size="14" font-weight="600" fill="#c07310">all 11 regions</text>
  <text x="816" y="432" text-anchor="middle" font-size="18" font-weight="600" fill="#55555f">= ONE SERVICE</text>

  <!-- the handful the platform team keeps -->
  <g fill="#eef0f4" stroke="#3a3a4a" stroke-width="2">
    <rect x="20" y="470" width="18" height="18" rx="3"/>
    <rect x="45" y="470" width="18" height="18" rx="3"/>
    <rect x="70" y="470" width="18" height="18" rx="3"/>
    <rect x="95" y="470" width="18" height="18" rx="3"/>
    <rect x="120" y="470" width="18" height="18" rx="3"/>
    <rect x="145" y="470" width="18" height="18" rx="3"/>
  </g>
  <text x="178" y="485" font-size="15" font-weight="600" fill="#55555f">+ platform accounts — management · DNS · audit …</text>

  <text x="816" y="505" text-anchor="middle" font-size="32" font-weight="700" fill="#b96a08" letter-spacing="1">≈ 270 ACCOUNTS</text>
</svg>
